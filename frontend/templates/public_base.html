<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} Council App{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    {% load static %}
    <link href="{% static 'dist/output.css' %}?v=20251215v2" rel="stylesheet">
    
    <!-- Component Library CSS -->
    <link href="{% static 'css/components.css' %}" rel="stylesheet">
    
    <!-- Module-specific CSS (loaded per template) -->
    {% block module_css %}{% endblock %}
    
    <style>
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent; 
        }
        ::-webkit-scrollbar-thumb {
            background: #D1D5DB; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9CA3AF; 
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #4B5563;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="font-sans antialiased bg-background-light dark:bg-background-dark text-text-main-light dark:text-text-main-dark selection:bg-primary selection:text-white transition-colors duration-200">
    <script>
        // Apply dark mode immediately on page load (before anything renders)
        (function() {
            const darkMode = localStorage.getItem('darkMode');
            if (darkMode === 'enabled') {
                document.documentElement.classList.add('dark');
            } else if (darkMode === 'disabled') {
                document.documentElement.classList.remove('dark');
            } else {
                // Default to system preference if not set
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                }
            }
        })();
    </script>
    
    <!-- Public Navigation Bar -->
    <nav class="bg-sidebar dark:bg-card-dark border-b border-gray-200 dark:border-gray-700 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <a href="/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                        <span class="material-icons-round text-white text-2xl">school</span>
                        <span class="text-xl font-bold text-white tracking-tight">Council App</span>
                    </a>
                </div>
                <div class="flex items-center gap-4">
                    <button id="darkModeToggle" class="p-2 rounded-full bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300 hover:bg-gray-300 dark:hover:bg-gray-600 focus:outline-none transition-colors">
                        <span class="material-icons-round text-xl dark:hidden">dark_mode</span>
                        <span class="material-icons-round text-xl hidden dark:block">light_mode</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0">
        <header class="bg-background-light dark:bg-background-dark pt-8 pb-4 px-8">
            <div>
                <h1 class="text-2xl font-bold text-lbg-main-light dark:text-lbg-main-dark">{% block page_title %}Council App{% endblock %}</h1>
                <p class="text-sm text-lbg-sub-light dark:text-lbg-sub-dark mt-1">{% block page_subtitle %}{% endblock %}</p>
            </div>
        </header>

        <div class="flex-1 overflow-auto px-8 py-6">
            <div id="errorContainer"></div>
            <div id="successContainer"></div>
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        const API_BASE = '/api';

        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-800 dark:text-red-200 px-4 py-3 rounded-lg mb-4">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        function showSuccess(message) {
            const container = document.getElementById('successContainer');
            container.innerHTML = `<div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 text-green-800 dark:text-green-200 px-4 py-3 rounded-lg mb-4">${message}</div>`;
            setTimeout(() => container.innerHTML = '', 5000);
        }

        // Dark mode toggle
        document.getElementById('darkModeToggle').addEventListener('click', function() {
            const html = document.documentElement;
            const isDark = html.classList.contains('dark');
            
            if (isDark) {
                html.classList.remove('dark');
                localStorage.setItem('darkMode', 'disabled');
            } else {
                html.classList.add('dark');
                localStorage.setItem('darkMode', 'enabled');
            }
        });

        // Public API call (no authentication needed)
        async function apiCall(endpoint, options = {}) {
            const response = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });
            return response;
        }
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
