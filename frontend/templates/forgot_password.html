<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Student Council Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
        }

        .container {
            background: white;
            border-radius: 0;
            box-shadow: none;
            width: 100%;
            height: 100vh;
            max-width: none;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-wrapper {
            width: 100%;
            max-width: 440px;
            padding: 48px 40px;
        }

        .icon {
            width: 64px;
            height: 64px;
            background: #2d7a4f;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            box-shadow: 0 4px 12px rgba(45, 122, 79, 0.2);
        }

        .icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }

        h1 {
            text-align: center;
            color: #1a1a1a;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
            gap: 12px;
        }

        .step {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            background: #e5e5e5;
            color: #666;
            transition: all 0.3s;
        }

        .step.active {
            background: #2d7a4f;
            color: white;
        }

        .step.completed {
            background: #2d7a4f;
            color: white;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
            background: white;
        }

        input:focus {
            outline: none;
            border-color: #2d7a4f;
            box-shadow: 0 0 0 3px rgba(45, 122, 79, 0.1);
        }

        .otp-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            font-weight: 600;
        }

        .btn {
            width: 100%;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #2d7a4f;
            color: white;
        }

        .btn-primary:hover {
            background: #246740;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(45, 122, 79, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #2d7a4f;
            border: 1px solid #2d7a4f;
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background: rgba(45, 122, 79, 0.05);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }

        .links {
            text-align: center;
            margin-top: 24px;
        }

        .links a {
            color: #2d7a4f;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .helper-text {
            font-size: 13px;
            color: #666;
            margin-top: 8px;
        }

        .resend-text {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 16px;
        }

        .resend-link {
            color: #2d7a4f;
            cursor: pointer;
            font-weight: 500;
        }

        .resend-link:hover {
            text-decoration: underline;
        }

        .resend-link.disabled {
            color: #999;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M12 2C9.243 2 7 4.243 7 7v2H6c-1.103 0-2 .897-2 2v9c0 1.103.897 2 2 2h12c1.103 0 2-.897 2-2v-9c0-1.103-.897-2-2-2h-1V7c0-2.757-2.243-5-5-5zM9 7c0-1.654 1.346-3 3-3s3 1.346 3 3v2H9V7zm4 10.723V20h-2v-2.277c-.595-.347-1-.984-1-1.723 0-1.103.897-2 2-2s2 .897 2 2c0 .738-.405 1.376-1 1.723z"/>
                </svg>
            </div>

            <h1>Reset Password</h1>
            <p class="subtitle">Follow the steps to reset your password</p>

            <div class="step-indicator">
                <div class="step active" id="step-1">1</div>
                <div class="step" id="step-2">2</div>
                <div class="step" id="step-3">3</div>
            </div>

            <div class="alert" id="alert"></div>

            <!-- Step 1: Enter Email -->
            <div class="form-section active" id="section-1">
                <form id="forgot-form">
                    <div class="form-group">
                        <label for="identifier">Email or Username</label>
                        <input type="text" id="identifier" name="identifier" required 
                               placeholder="Enter your email or username">
                        <p class="helper-text">We'll send a verification code to your registered email</p>
                    </div>
                    <button type="submit" class="btn btn-primary" id="send-btn">
                        Send Verification Code
                    </button>
                </form>
            </div>

            <!-- Step 2: Verify OTP -->
            <div class="form-section" id="section-2">
                <form id="verify-form">
                    <div class="form-group">
                        <label for="otp">Verification Code</label>
                        <input type="text" id="otp" name="otp" maxlength="6" required 
                               class="otp-input" placeholder="000000">
                        <p class="helper-text">Enter the 6-digit code sent to <strong id="email-display"></strong></p>
                    </div>
                    <button type="submit" class="btn btn-primary" id="verify-btn">
                        Verify Code
                    </button>
                    <p class="resend-text">
                        Didn't receive code? 
                        <span class="resend-link" id="resend-link">Resend</span>
                        <span id="timer"></span>
                    </p>
                </form>
            </div>

            <!-- Step 3: Reset Password -->
            <div class="form-section" id="section-3">
                <form id="reset-form">
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" name="new_password" required 
                               placeholder="Enter new password">
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm_password" required 
                               placeholder="Confirm new password">
                        <p class="helper-text">Password must be at least 8 characters</p>
                    </div>
                    <button type="submit" class="btn btn-primary" id="reset-btn">
                        Reset Password
                    </button>
                </form>
            </div>

            <div class="links">
                <a href="/">Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        let currentStep = 1;
        let userIdentifier = '';
        let userEmail = '';
        let verifiedOTP = '';
        let resendTimer = 0;
        let timerInterval = null;

        // API Base URL
        const API_URL = window.location.origin + '/api/accounts';

        // Show alert
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert alert-${type} show`;
            setTimeout(() => {
                alert.classList.remove('show');
            }, 5000);
        }

        // Update steps
        function updateSteps(step) {
            for (let i = 1; i <= 3; i++) {
                const stepEl = document.getElementById(`step-${i}`);
                const sectionEl = document.getElementById(`section-${i}`);
                
                if (i < step) {
                    stepEl.classList.add('completed');
                    stepEl.classList.remove('active');
                } else if (i === step) {
                    stepEl.classList.add('active');
                    stepEl.classList.remove('completed');
                } else {
                    stepEl.classList.remove('active', 'completed');
                }

                if (i === step) {
                    sectionEl.classList.add('active');
                } else {
                    sectionEl.classList.remove('active');
                }
            }
            currentStep = step;
        }

        // Start resend timer
        function startResendTimer() {
            resendTimer = 60;
            const resendLink = document.getElementById('resend-link');
            const timerEl = document.getElementById('timer');
            resendLink.classList.add('disabled');

            timerInterval = setInterval(() => {
                resendTimer--;
                timerEl.textContent = `(${resendTimer}s)`;
                
                if (resendTimer <= 0) {
                    clearInterval(timerInterval);
                    resendLink.classList.remove('disabled');
                    timerEl.textContent = '';
                }
            }, 1000);
        }

        // Step 1: Send OTP
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('send-btn');
            const identifier = document.getElementById('identifier').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Sending...';

            try {
                const response = await fetch(`${API_URL}/forgot-password/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ identifier })
                });

                const data = await response.json();

                if (response.ok) {
                    userIdentifier = identifier;
                    userEmail = data.email;
                    document.getElementById('email-display').textContent = userEmail;
                    showAlert(data.message, 'success');
                    updateSteps(2);
                    startResendTimer();
                } else {
                    showAlert(data.error || 'Failed to send verification code', 'error');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Send Verification Code';
            }
        });

        // Resend OTP
        document.getElementById('resend-link').addEventListener('click', async () => {
            const resendLink = document.getElementById('resend-link');
            if (resendLink.classList.contains('disabled')) return;

            try {
                const response = await fetch(`${API_URL}/forgot-password/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ identifier: userIdentifier })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('New code sent to your email', 'success');
                    startResendTimer();
                } else {
                    showAlert(data.error || 'Failed to resend code', 'error');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            }
        });

        // Step 2: Verify OTP
        document.getElementById('verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('verify-btn');
            const otp = document.getElementById('otp').value;

            if (otp.length !== 6) {
                showAlert('Please enter a valid 6-digit code', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Verifying...';

            try {
                const response = await fetch(`${API_URL}/verify-otp/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        identifier: userIdentifier,
                        otp: otp 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    verifiedOTP = otp;
                    showAlert(data.message, 'success');
                    updateSteps(3);
                    if (timerInterval) clearInterval(timerInterval);
                } else {
                    showAlert(data.error || 'Invalid verification code', 'error');
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Verify Code';
            }
        });

        // Step 3: Reset Password
        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('reset-btn');
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            if (newPassword.length < 8) {
                showAlert('Password must be at least 8 characters', 'error');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Resetting...';

            try {
                const response = await fetch(`${API_URL}/reset-password/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        identifier: userIdentifier,
                        otp: verifiedOTP,
                        new_password: newPassword,
                        confirm_password: confirmPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(data.message, 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showAlert(data.error || 'Failed to reset password', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Reset Password';
                }
            } catch (error) {
                showAlert('Network error. Please try again.', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Reset Password';
            }
        });

        // Auto-focus and format OTP input
        document.getElementById('otp').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/\D/g, '');
        });
    </script>
</body>
</html>
